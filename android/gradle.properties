# Fallback defaults used only when the consuming app's android/build.gradle does not
# define these in rootProject.ext. Kept in sync with the SDK's documented minimums:
# Kotlin 2.3.0 (the Ticketmaster SDK pulls kotlin-stdlib 2.3.0, which the RN-default
# 2.1.20 compiler can't read), minSdk 28, compileSdk 36.
TicketmasterIgnite_kotlinVersion=2.3.0
TicketmasterIgnite_minSdkVersion=28
TicketmasterIgnite_targetSdkVersion=36
TicketmasterIgnite_compileSdkVersion=36
