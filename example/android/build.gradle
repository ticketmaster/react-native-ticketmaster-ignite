// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 28
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.3.0"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        // Pin Kotlin Gradle plugin to 2.3.0: the Ticketmaster SDK 3.18.0 graph
        // (androidx Compose 1.10.x / annotation-experimental 1.5.0) pulls kotlin-stdlib 2.3.0,
        // which the RN-default 2.1.20 compiler can't read. Highest version wins on the
        // buildscript classpath, overriding RNGP's transitive 2.1.20.
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }

    allprojects {
        repositories {
            google()
            mavenCentral()
        }
    }
}

apply plugin: "com.facebook.react.rootproject"
